        // 等雨来策略年化收益率计算
        // 原理：根据ROE、分红率、PE值计算市值变化，得出年化收益率
        function calculateDengyulaiReturn(initialPE, targetPE, roe, dividendRate, years) {
            // 保留收益率 = ROE * (1 - 分红率)
            const retentionRate = 1 - dividendRate;
            const retainedEarningsRate = roe * retentionRate;
            
            // 初始净资产收益率（假设）
            const initialNetAsset = 1; // 假设初始净资产为1
            const initialEarnings = initialNetAsset * roe;
            
            // 计算n年后的净资产（考虑保留收益复利）
            const finalNetAsset = initialNetAsset * Math.pow(1 + retainedEarningsRate, years);
            
            // 初始市值 = 初始PE * 初始盈利 = PE * (净资产 * ROE)
            const initialMarketCap = initialPE * initialEarnings;
            
            // 期末市值 = 目标PE * 期末盈利 = 目标PE * (期末净资产 * ROE)
            const finalEarnings = finalNetAsset * roe;
            const finalMarketCap = targetPE * finalEarnings;
            
            // 年化收益率 = (期末市值 / 初始市值)^(1/n) - 1
            const annualReturn = Math.pow(finalMarketCap / initialMarketCap, 1 / years) - 1;
            
            return annualReturn * 100; // 转换为百分比
        }

        // 计算总收益率
        function calculateTotalReturn(annualReturn, years) {
            return (Math.pow(1 + annualReturn / 100, years) - 1) * 100;
        }

        // 计算最终金额
        function calculateFinalAmount(principal, annualReturn, years) {
            return principal * Math.pow(1 + annualReturn / 100, years);
        }

        }

        // 初始化每个指数卡片的迷你PE历史曲线图
        function initMiniCharts() {
            // 生成近10年的年份标签
            const currentYear = new Date().getFullYear();
            const years = [];
            for (let i = 9; i >= 0; i--) {
                years.push(currentYear - i);
            }

            indexData.forEach(index => {
                const ctx = document.getElementById(`chart-${index.id}`);
                if (!ctx) return;

                const statusConfig = getStatusConfig(index.status);
                const color = statusConfig.color;

                // 计算PE分位值
                function calculatePercentile(data, percentile) {
                    const sorted = [...data].sort((a, b) => a - b);
                    const index = Math.floor(data.length * percentile / 100);
                    return sorted[index];
                }
                const pe30 = calculatePercentile(index.historicalPE, 30);
                const pe50 = calculatePercentile(index.historicalPE, 50);
                const pe70 = calculatePercentile(index.historicalPE, 70);

                new Chart(ctx.getContext('2d'), {
                    type: 'line',
                    data: {
                        labels: years,
                        datasets: [
                            {
                                label: 'PE历史',
                                data: index.historicalPE,
                                borderColor: color,
                                backgroundColor: 'transparent',
                                fill: false,
                                tension: 0.4,
                                pointRadius: 0,
                                pointHoverRadius: 4,
                                pointHoverBackgroundColor: color,
                                pointHoverBorderColor: '#fff',
                                pointHoverBorderWidth: 2,
                                borderWidth: 1.5
                            },
                            {
                                label: '中位值',
                                data: Array(years.length).fill(pe50),
                                borderColor: '#8b5cf6',
                                borderDash: [3, 3],
                                pointRadius: 0,
                                pointHoverRadius: 0,
                                fill: false,
                                borderWidth: 1
                            },
                            {
                                label: '30%分位',
                                data: Array(years.length).fill(pe30),
                                borderColor: '#22c55e',
                                borderDash: [3, 3],
                                pointRadius: 0,
                                pointHoverRadius: 0,
                                fill: false,
                                borderWidth: 1
                            },
                            {
                                label: '70%分位',
                                data: Array(years.length).fill(pe70),
                                borderColor: '#ef4444',
                                borderDash: [3, 3],
                                pointRadius: 0,
                                pointHoverRadius: 0,
                                fill: false,
                                borderWidth: 1
                            }
                        ]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        interaction: {
                            mode: 'index',
                            intersect: false
                        },
                        plugins: {
                            legend: {
                                display: false
                            },
                            tooltip: {
                                enabled: true,
                                backgroundColor: 'rgba(254, 243, 199, 0.95)',
                                titleColor: '#92400e',
                                bodyColor: '#d97706',
                                borderColor: '#fbbf24',
                                borderWidth: 1,
                                padding: 8,
                                displayColors: true,
                                titleFont: {
                                    size: 12,
                                    weight: 'bold'
                                },
                                bodyFont: {
                                    size: 12
                                },
                                callbacks: {
                                    title: function(context) {
                                        return context[0].label;
                                    },
                                    label: function(context) {
                                        if (context.datasetIndex === 0) {
                                            return `PE ${context.parsed.y.toFixed(2)}`;
                                        }
                                        return null;
                                    }
                                }
                            }
                        },
                        scales: {
                            x: {
                                display: true,
                                ticks: {
                                    color: '#6b7280',
                                    font: {
                                        size: 10
                                    },
                                    maxTicksLimit: 5

        // 保存数据
        function saveData() {
            indexData.forEach(index => {
                index.currentPE = parseFloat(document.getElementById(`pe-${index.id}`).value);
                index.pePercentile = parseInt(document.getElementById(`pepct-${index.id}`).value);
                index.currentPB = parseFloat(document.getElementById(`pb-${index.id}`).value);
                index.pbPercentile = parseInt(document.getElementById(`pbpct-${index.id}`).value);
                index.dividendRate = parseFloat(document.getElementById(`div-${index.id}`).value) / 100;
                index.roe = parseFloat(document.getElementById(`roe-${index.id}`).value) / 100;

                // 自动计算估值状态
                if (index.pePercentile < 30 && index.pbPercentile < 30) {
                    index.status = 'undervalued';
                } else if (index.pePercentile > 70 || index.pbPercentile > 70) {
                    index.status = 'overvalued';
                } else {
                    index.status = 'fair';
                }

                // 更新目标PE
                index.targetPE = {
                    undervalued: index.currentPE * 1.2,
                    fair: index.currentPE * 1.1,
                    overvalued: index.currentPE * 0.9
                };

                // 重新计算预测数据（等雨来策略）
                index.predictions = {
                    undervalued: {
                        1: calculateDengyulaiReturn(index.currentPE, index.targetPE.undervalued, index.roe, index.dividendRate, 1),
                        3: calculateDengyulaiReturn(index.currentPE, index.targetPE.undervalued, index.roe, index.dividendRate, 3),
                        5: calculateDengyulaiReturn(index.currentPE, index.targetPE.undervalued, index.roe, index.dividendRate, 5),
                        10: calculateDengyulaiReturn(index.currentPE, index.targetPE.undervalued, index.roe, index.dividendRate, 10)
                    },
                    fair: {
                        1: calculateDengyulaiReturn(index.currentPE, index.targetPE.fair, index.roe, index.dividendRate, 1),
                        3: calculateDengyulaiReturn(index.currentPE, index.targetPE.fair, index.roe, index.dividendRate, 3),
                        5: calculateDengyulaiReturn(index.currentPE, index.targetPE.fair, index.roe, index.dividendRate, 5),
                        10: calculateDengyulaiReturn(index.currentPE, index.targetPE.fair, index.roe, index.dividendRate, 10)
                    },
                    overvalued: {
                        1: calculateDengyulaiReturn(index.currentPE, index.targetPE.overvalued, index.roe, index.dividendRate, 1),
                        3: calculateDengyulaiReturn(index.currentPE, index.targetPE.overvalued, index.roe, index.dividendRate, 3),
                        5: calculateDengyulaiReturn(index.currentPE, index.targetPE.overvalued, index.roe, index.dividendRate, 5),
                        10: calculateDengyulaiReturn(index.currentPE, index.targetPE.overvalued, index.roe, index.dividendRate, 10)
                    }
                };
            });

            alert('✅ 数据保存成功！');
            showHomePage();

        // 导出数据
        function exportData() {
            const dataStr = JSON.stringify(indexData, null, 2);
            const blob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `index-fund-data-${new Date().toISOString().split('T')[0]}.json`;
            a.click();
        }

        // 计算分位数
        function calculatePercentile(data, percentile) {
            const sorted = [...data].sort((a, b) => a - b);
            const index = (percentile / 100) * (sorted.length - 1);
            const lower = Math.floor(index);
            const upper = Math.ceil(index);
            if (lower === upper) return sorted[lower];
            return sorted[lower] + (sorted[upper] - sorted[lower]) * (index - lower);
        }

        // 从年数据生成月数据（线性插值）
        function generateMonthlyData(yearlyData) {
            const monthlyData = [];
            for (let i = 0; i < yearlyData.length - 1; i++) {
                const startValue = yearlyData[i];
                const endValue = yearlyData[i + 1];
                const monthsPerYear = 12;

                for (let m = 0; m < monthsPerYear; m++) {
                    const ratio = m / monthsPerYear;
                    const value = startValue + (endValue - startValue) * ratio;
                    // 添加一些随机波动，模拟真实市场波动
                    const noise = (Math.random() - 0.5) * (endValue - startValue) * 0.15;
                    monthlyData.push(value + noise);
                }
            }
            // 添加最后一个值
            monthlyData.push(yearlyData[yearlyData.length - 1]);
            return monthlyData.slice(0, 120);
        }

        // 从年数据生成日数据（约2500个交易日/10年）
        // 使用确定性算法（固定种子），确保每次刷新数据一致
        // 注意：这是基于真实年数据的插值生成，并非完整的真实日度数据
        function generateDailyData(yearlyData, totalDays) {
            const dailyData = [];
            const dataPoints = yearlyData.length;

            // 简单的伪随机数生成器（固定种子）
            let seed = 42;
            function seededRandom() {
                seed = (seed * 9301 + 49297) % 233280;
                return seed / 233280;
            }

            // 计算整体的波动特征（基于真实年数据的统计）
            let totalChange = 0;
            for (let i = 1; i < dataPoints; i++) {
                totalChange += Math.abs(yearlyData[i] - yearlyData[i-1]);
            }
            const avgYearlyChange = totalChange / (dataPoints - 1);
            const avgValue = yearlyData.reduce((a, b) => a + b, 0) / dataPoints;
            const volatility = avgYearlyChange / avgValue; // 年度波动率

            for (let i = 0; i < dataPoints - 1; i++) {
                const startValue = yearlyData[i];
                const endValue = yearlyData[i + 1];
                const daysPerYear = totalDays / (dataPoints - 1);

                for (let d = 0; d < daysPerYear; d++) {
                    const ratio = d / daysPerYear;

                    // 基础趋势：使用三次贝塞尔曲线插值（更平滑）
                    const ease = ratio < 0.5
                        ? 4 * ratio * ratio * ratio
                        : 1 - Math.pow(-2 * ratio + 2, 3) / 2;
                    const value = startValue + (endValue - startValue) * ease;

                    // 添加波动：基于真实PE市场的统计特征
                    // 日波动约为年波动的1/√250（日数平方根关系）
                    const dailyVolatility = volatility * avgValue / Math.sqrt(250);

                    // 多种波动成分：
                    // 1. 随机波动（70%权重）- 市场噪声
                    const randomNoise = (seededRandom() - 0.5) * dailyVolatility * 2;

                    // 2. 周期波动（20%权重）- 模拟季节性
                    const cycleNoise = Math.sin(d / 20) * dailyVolatility * 0.3
                                     + Math.sin(d / 60) * dailyVolatility * 0.2;

                    // 3. 趋势波动（10%权重）- 模拟中期趋势
                    const trendNoise = Math.sin(d / 100) * dailyVolatility * 0.4;

                    dailyData.push(value + randomNoise + cycleNoise + trendNoise);
                }
            }

            // 添加最后一个值
            dailyData.push(yearlyData[dataPoints - 1]);

            // 确保数据长度正确
            const result = dailyData.slice(0, totalDays);

            // 后处理：确保最后一个点是准确的当前PE值
            if (result.length > 0) {
                result[result.length - 1] = yearlyData[yearlyData.length - 1];
            }

            return result;
        }

        // 初始化图表
        function initCharts(indexId, currentTab) {
            const index = indexData.find(i => i.id === indexId);

            // 历史估值图表（近10年PE和PB）
            const historyCtx = document.getElementById('historyChart');
            if (historyCtx) {
                let dailyPE, labels;

                // 优先使用真实PE历史数据
                if (index.realPEHistory && index.realPEHistory.length > 0) {
                    console.log(`使用 ${index.name} 的真实PE历史数据`);
                    dailyPE = [...index.realPEHistory];
                    labels = [...index.realPEHistoryDates];

                    // 根据时间范围筛选数据（基于日期而不是数据点数）
                    const currentDate = new Date(labels[labels.length - 1]); // 最后一个日期
                    let startDate;

                    if (currentHistoryRange === '3years') {
                        // 近3年：从3年前的今天开始
                        startDate = new Date(currentDate);
                        startDate.setFullYear(startDate.getFullYear() - 3);
                    } else if (currentHistoryRange === '5years') {
                        // 近5年：从5年前的今天开始
                        startDate = new Date(currentDate);
                        startDate.setFullYear(startDate.getFullYear() - 5);
                    } else {
                        // 近10年：显示全部数据（从数据开始日期）
                        startDate = new Date(labels[0]);
                    }

                    // 筛选日期大于等于开始日期的数据
                    const startDateStr = startDate.toISOString().split('T')[0];
                    const startIndex = labels.findIndex(label => label >= startDateStr);

                    if (startIndex > 0) {
                        dailyPE = dailyPE.slice(startIndex);
                        labels = labels.slice(startIndex);
                    }

                    console.log(`时间范围: ${labels[0]} 到 ${labels[labels.length - 1]} (${dailyPE.length}个数据点)`);
                } else {
                    console.log(`使用 ${index.name} 的插值数据`);
                    // 生成约2500个交易日的日期标签（从10年前到现在）
                    const currentDate = new Date();
                    labels = [];

                    // 根据时间范围确定数据点数
                    let totalDays;
                    if (currentHistoryRange === '3years') {
                        totalDays = 750; // 3年
                    } else if (currentHistoryRange === '5years') {
                        totalDays = 1250; // 5年
                    } else {
                        totalDays = 2500; // 10年
                    }

                    // 从当前日期倒推约N个交易日
                    // 简单模拟：每个交易日间隔1天，周末和节假日不排除（简化处理）
                    for (let i = totalDays - 1; i >= 0; i--) {
                        const date = new Date(currentDate);
                        date.setDate(date.getDate() - i);
                        // 格式化日期为 YYYY-MM-DD
                        const dateStr = date.toISOString().split('T')[0];
                        labels.push(dateStr);
                    }

                    // 从年数据生成日数据（基于真实年数据，使用固定种子插值）
                    dailyPE = generateDailyData(index.historicalPE, totalDays);
                }

                // 更新标题显示当前时间范围
                const rangeText = currentHistoryRange === '3years' ? '近3年' :
                                 currentHistoryRange === '5years' ? '近5年' : '近10年';
                const dateRange = `${labels[0].substring(0, 7)} - ${labels[labels.length - 1].substring(0, 7)}`;
                document.getElementById('historyChartTitle').textContent =
                    `📊 历史估值走势（${rangeText}：${dateRange}）`;

                // 更新数据来源标注
                const noteEl = document.getElementById('chartDataSourceNote');
                if (noteEl) {
                    if (index.isRealData) {
                        noteEl.innerHTML = `<span style="color:#10b981">● 真实数据</span> 来源：${index.dataSourceReal || index.dataSource}，共 ${dailyPE.length} 个数据点`;
                    } else {
                        noteEl.innerHTML = `<span style="color:#f59e0b">● 插值数据</span> 来源：${index.dataSourceReal || index.dataSource}（年度锚点线性插值，趋势参考）`;
                    }
                }

                // 计算PE的分位数
                // 【重要】基于完整的历史数据计算分位线，而不是筛选后的数据
                // 这样分位线在切换时间范围时保持不变，代表绝对的历史分位水平
                const fullPEData = (index.realPEHistory && index.realPEHistory.length > 0)
                    ? index.realPEHistory : dailyPE;
                const pe30 = calculatePercentile(fullPEData, 30);
                const pe50 = calculatePercentile(fullPEData, 50);
                const pe70 = calculatePercentile(fullPEData, 70);
                console.log(`分位线（基于全历史${fullPEData.length}条数据）: 30%=${pe30.toFixed(2)}, 50%=${pe50.toFixed(2)}, 70%=${pe70.toFixed(2)}`);

                // 销毁旧图表实例
                if (historyChartInstance) {
                    historyChartInstance.destroy();
                }

                // 更新最新PE标签（HTML绝对定位方式，完全绕开Canvas坐标计算问题）
                const lastPE = dailyPE[dailyPE.length - 1];
                const lastDate = labels[labels.length - 1];
                const peLabel = document.getElementById('latestPELabel');
                const peValueEl = document.getElementById('latestPEValue');
                const peDateEl = document.getElementById('latestPEDate');
                if (peLabel && peValueEl && peDateEl) {
                    peValueEl.textContent = `最新PE: ${lastPE.toFixed(2)}`;
                    peDateEl.textContent = lastDate;
                    peLabel.style.display = 'block';
                }

                historyChartInstance = new Chart(historyCtx.getContext('2d'), {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: [{
                            label: 'PE历史',
                            data: dailyPE,
                            borderColor: '#f97316',
                            backgroundColor: 'transparent',
                            fill: false,
                            tension: 0.1,
                            pointRadius: 0,
                            pointHoverRadius: 6,
                            pointHoverBackgroundColor: '#f97316',
                            pointHoverBorderColor: '#fff',
                            pointHoverBorderWidth: 2,
                            borderWidth: 1.5
                        }, {
                            label: 'PE中位值(50%)',
                            data: Array(dailyPE.length).fill(pe50),
                            borderColor: '#8b5cf6',
                            borderDash: [5, 5],
                            pointRadius: 0,
                            pointHoverRadius: 0,
                            fill: false,
                            borderWidth: 1.5
                        }, {
                            label: 'PE 30%分位',
                            data: Array(dailyPE.length).fill(pe30),
                            borderColor: '#22c55e',
                            borderDash: [5, 5],
                            pointRadius: 0,
                            pointHoverRadius: 0,
                            fill: false,
                            borderWidth: 1.5
                        }, {
                            label: 'PE 70%分位',
                            data: Array(dailyPE.length).fill(pe70),
                            borderColor: '#ef4444',
                            borderDash: [5, 5],
                            pointRadius: 0,
                            pointHoverRadius: 0,
                            fill: false,
                            borderWidth: 1.5
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        interaction: {
                            mode: 'index',
                            intersect: false
                        },
                        plugins: {
                            legend: {
                                display: false
                            },
                            tooltip: {
                                enabled: true,
                                backgroundColor: 'rgba(254, 243, 199, 0.95)',
                                titleColor: '#92400e',
                                bodyColor: '#d97706',
                                borderColor: '#fbbf24',
                                borderWidth: 1,
                                padding: 12,
                                displayColors: false,
                                titleFont: {
                                    size: 14,
                                    weight: 'bold'
                                },
                                bodyFont: {
                                    size: 16,
                                    weight: 'bold'
                                },
                                callbacks: {
                                    title: function(context) {
                                        return context[0].label;
                                    },
                                    label: function(context) {
                                        if (context.datasetIndex === 0) {
                                            return `PE ${context.parsed.y.toFixed(2)}`;
                                        }
                                        return null;
                                    },
                                    afterBody: function(context) {
                                        const currentPE = context[0].parsed.y;
                                        let status = '';
                                        if (currentPE < pe30) status = '低估区间';
                                        else if (currentPE < pe50) status = '偏低';
                                        else if (currentPE < pe70) status = '偏高';
                                        else status = '高估区间';
                                        return [``, status];
                                    }
                                }
                            }
                        },
                        scales: {
                            x: {
                                ticks: {
                                    color: '#9ca3af',
                                    maxTicksLimit: 6,
                                    callback: function(value, index, values) {
                                        const label = this.getLabelForValue(value);
                                        return label ? label.substring(0, 7) : '';
                                    }
                                },
                                grid: {
                                    color: 'rgba(55, 65, 81, 0.3)',
                                    drawOnChartArea: true
                                }
                            },
                            y: {
                                ticks: { color: '#9ca3af' },
                                grid: { color: 'rgba(55, 65, 81, 0.3)' },
                                title: {
                                    display: true,
                                    text: 'PE倍数',
                                    color: '#9ca3af'
                                }
                            }
                        }
                    }
                });
            }

            // 收益对比图表
            const returnCtx = document.getElementById('returnChart');
            if (returnCtx) {
                new Chart(returnCtx.getContext('2d'), {
                    type: 'line',
                    data: {
                        labels: ['1年', '3年', '5年', '10年'],
                        datasets: [
                            {
                                label: '乐观（PE回高估区间）',
                                data: [1, 3, 5, 10].map(y => index.predictions.undervalued[y]),
                                borderColor: '#10b981',
                                backgroundColor: 'rgba(16, 185, 129, 0.1)',
                                tension: 0.4
                            },
                            {
                                label: '中性（PE保持不变）',
                                data: [1, 3, 5, 10].map(y => index.predictions.fair[y]),
                                borderColor: '#f59e0b',
                                backgroundColor: 'rgba(245, 158, 11, 0.1)',
                                tension: 0.4
                            },
                            {
                                label: '悲观（PE回低估区间）',
                                data: [1, 3, 5, 10].map(y => index.predictions.overvalued[y]),
                                borderColor: '#6b7280',
                                backgroundColor: 'rgba(107, 114, 128, 0.1)',
                                tension: 0.4
                            }
                        ]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: {
                                labels: { color: '#9ca3af' }
                            }
                        },
                        scales: {
                            x: {
                                ticks: { color: '#9ca3af' },
                                grid: { color: '#374151' }
                            },
                            y: {
                                ticks: { 
                                    color: '#9ca3af',
                                    callback: value => value + '%'
                                },
                                grid: { color: '#374151' },
                                title: {
                                    display: true,
                                    text: '年化收益率 (%)',
                                    color: '#9ca3af'
                                }
                            }
                        }
                    }
                });
            }
        }

        // 初始化应用
        document.addEventListener('DOMContentLoaded', async () => {
            // 尝试加载真实的PE历史数据
            await loadRealPEHistory();
            // 显示首页
            showHomePage();
        });
